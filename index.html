<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeletal Steampunk Clock</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts for Victorian & retro-futuristic aesthetics -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@500;700&family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body class="theme-brass">

  <!-- Ambient Background Canvas for Steam & Ember Particles -->
  <canvas id="ambient-canvas"></canvas>

  <div class="app-viewport">
    
    <!-- HEADER -->
    <header class="main-header">
      <h1 class="brand-title">CHRONOS AUTOMATA</h1>
      <p class="brand-subtitle">Skeletal Mechanical Clockwork • No. 9482-A • Est. 1889</p>
    </header>

    <!-- MAIN INTERACTIVE WORKSHOP AREA -->
    <div class="workshop-area">
      
      <!-- LEFT STEAM GAUGE (Boiler Pressure) -->
      <div class="gauge-container left-gauge" id="boiler-gauge">
        <div class="gauge-glass">
          <div class="gauge-bezel"></div>
          <div class="gauge-dial">
            <div class="gauge-ticks"></div>
            <div class="gauge-needle" id="needle-boiler"></div>
            <div class="gauge-center"></div>
            <div class="gauge-label">BOILER PSI</div>
            <div class="gauge-value" id="val-boiler">0</div>
          </div>
          <div class="gauge-reflection"></div>
        </div>
      </div>

      <!-- CENTER: MAJESTIC PARALLAX GLASS CABINET -->
      <div class="cabinet-perspective">
        <div class="glass-cabinet" id="main-cabinet">
          
          <!-- Glossy Glass Reflection Overlay -->
          <div class="cabinet-glass-overlay"></div>

          <!-- LAYER 1: BACK FRAME & DECORATIVE PLATES (Deepest) -->
          <div class="cabinet-layer layer-back" data-depth="-0.6">
            <svg class="gear-svg" viewBox="0 0 800 800">
              <!-- Backplate structural pillars -->
              <path d="M 400 50 L 400 750 M 100 400 L 700 400 M 180 180 L 620 620 M 180 620 L 620 180" stroke="var(--frame-color)" stroke-width="12" stroke-linecap="round" opacity="0.8" />
              <circle cx="400" cy="400" r="370" fill="none" stroke="var(--frame-color)" stroke-width="16" opacity="0.9" />
              <circle cx="400" cy="400" r="350" fill="none" stroke="var(--frame-color)" stroke-width="3" stroke-dasharray="8 12" opacity="0.6" />
              <!-- Heavy industrial rivets -->
              <circle cx="400" cy="50" r="12" class="gear-accent" />
              <circle cx="400" cy="750" r="12" class="gear-accent" />
              <circle cx="50" cy="400" r="12" class="gear-accent" />
              <circle cx="750" cy="400" r="12" class="gear-accent" />
            </svg>
          </div>

          <!-- LAYER 2: BACK GEARS (Hour Wheel / Slow Reduction) -->
          <div class="cabinet-layer layer-gears-back" data-depth="-0.3">
            <svg class="gear-svg" id="svg-gears-back" viewBox="0 0 800 800">
              <!-- Dynamically injected slow-turning gears -->
            </svg>
          </div>

          <!-- LAYER 3: MIDDLE GEARS (Intermediate Reduction Train) -->
          <div class="cabinet-layer layer-gears-mid" data-depth="-0.1">
            <svg class="gear-svg" id="svg-gears-mid" viewBox="0 0 800 800">
              <!-- Dynamically injected mid-speed gears -->
            </svg>
          </div>

          <!-- LAYER 4: FROSTED GLASS DIAL (Separates back/mid gears from front) -->
          <div class="cabinet-layer layer-dial" data-depth="0.1">
            <div class="frosted-dial">
              <svg viewBox="0 0 800 800" class="dial-elements">
                <!-- Outer Chapter Ring -->
                <circle cx="400" cy="400" r="330" fill="none" stroke="var(--metal-bright)" stroke-width="14" />
                <circle cx="400" cy="400" r="342" fill="none" stroke="var(--frame-color)" stroke-width="3" />
                <circle cx="400" cy="400" r="318" fill="none" stroke="var(--frame-color)" stroke-width="2" />
                
                <!-- Minute Track ticks -->
                <g id="minute-ticks" stroke="var(--frame-color)" stroke-width="2">
                  <!-- Injected via JS -->
                </g>

                <!-- Roman Numerals (Polished Brass look) -->
                <g id="roman-numerals" class="numerals-group">
                  <!-- Injected via JS -->
                </g>
              </svg>
            </div>
          </div>

          <!-- LAYER 5: FRONT GEARS & ESCAPEMENT (Fast moving, sharp focus) -->
          <div class="cabinet-layer layer-gears-front" data-depth="0.3">
            <svg class="gear-svg" id="svg-gears-front" viewBox="0 0 800 800">
              <!-- Dynamic escapement wheel, seconds gear, pinion -->
            </svg>
          </div>

          <!-- LAYER 6: PENDULUM & ESCAPEMENT ANCHOR -->
          <div class="cabinet-layer layer-escapement" data-depth="0.5">
            <svg class="gear-svg" viewBox="0 0 800 800">
              <!-- Pendulum swinging from top center -->
              <g id="pendulum-assembly">
                <rect x="390" y="80" width="20" height="30" fill="var(--frame-color)" rx="3" />
                <!-- Pendulum Rod -->
                <line x1="400" y1="100" x2="400" y2="720" stroke="var(--metal-mid)" stroke-width="8" />
                <line x1="396" y1="100" x2="396" y2="720" stroke="#fff" stroke-width="1.5" opacity="0.4" />
                <!-- Heavy decorative brass bob -->
                <circle cx="400" cy="680" r="75" class="gear-metal" stroke="var(--frame-color)" stroke-width="4" />
                <circle cx="400" cy="680" r="58" fill="none" stroke="var(--metal-accent)" stroke-width="3" />
                <circle cx="400" cy="680" r="40" fill="none" stroke="var(--frame-color)" stroke-width="2" stroke-dasharray="5 5" />
                <circle cx="400" cy="680" r="12" fill="var(--frame-color)" />
              </g>

              <!-- Anchor / Pallet Fork rocking over the escape wheel -->
              <g id="anchor-assembly">
                <path d="M 360 170 C 370 145, 385 130, 400 130 C 415 130, 430 145, 440 170 L 445 165 C 435 135, 418 120, 400 120 C 382 120, 365 135, 355 165 Z" fill="var(--frame-color)" />
                <!-- Ruby Pallets -->
                <rect x="349" y="163" width="12" height="16" fill="#ff2a5f" transform="rotate(-12 349 163)" rx="2" />
                <rect x="439" y="163" width="12" height="16" fill="#ff2a5f" transform="rotate(12 439 163)" rx="2" />
                <!-- Anchor Center Arbor -->
                <circle cx="400" cy="130" r="14" class="gear-metal" />
                <circle cx="400" cy="130" r="6" fill="#000" />
                <!-- Crutch linking to pendulum -->
                <line x1="400" y1="130" x2="400" y2="240" stroke="var(--frame-color)" stroke-width="4" />
                <circle cx="400" cy="245" r="8" class="gear-accent" />
              </g>
            </svg>
          </div>

          <!-- LAYER 7: ORNATE FILIGREE HANDS (Front-most) -->
          <div class="cabinet-layer layer-hands" data-depth="0.7">
            <svg class="gear-svg" viewBox="0 0 800 800">
              <g filter="drop-shadow(0px 10px 12px rgba(0,0,0,0.6))">
                <!-- Hour Hand -->
                <g id="hand-hour">
                  <path d="M 400 400 L 390 360 Q 375 300, 390 260 Q 370 245, 400 170 Q 430 245, 410 260 Q 425 300, 410 360 Z" fill="var(--frame-color)" stroke="var(--metal-bright)" stroke-width="2" />
                  <circle cx="400" cy="275" r="10" fill="none" stroke="var(--metal-bright)" stroke-width="2" />
                  <path d="M 400 200 L 394 230 L 406 230 Z" fill="var(--metal-bright)" />
                </g>

                <!-- Minute Hand -->
                <g id="hand-minute">
                  <path d="M 400 400 L 392 360 Q 380 280, 392 190 Q 375 165, 400 70 Q 425 165, 408 190 Q 420 280, 408 360 Z" fill="var(--frame-color)" stroke="var(--metal-bright)" stroke-width="2" />
                  <circle cx="400" cy="180" r="12" fill="none" stroke="var(--metal-bright)" stroke-width="2" />
                  <circle cx="400" cy="120" r="8" fill="none" stroke="var(--metal-bright)" stroke-width="1.5" />
                  <path d="M 400 90 L 395 110 L 405 110 Z" fill="var(--metal-bright)" />
                </g>

                <!-- Second Hand (Vibrant Crimson with Brass Counterweight) -->
                <g id="hand-second">
                  <line x1="400" y1="480" x2="400" y2="40" stroke="#d92b2b" stroke-width="3" stroke-linecap="round" />
                  <!-- Crescent counterweight -->
                  <path d="M 382 450 A 22 22 0 0 0 418 450 A 16 16 0 0 1 382 450 Z" class="gear-metal" stroke="var(--frame-color)" stroke-width="1.5" />
                  <circle cx="400" cy="400" r="8" fill="#d92b2b" />
                </g>

                <!-- Central Cap Arbor -->
                <circle cx="400" cy="400" r="22" fill="var(--frame-color)" />
                <circle cx="400" cy="400" r="14" class="gear-metal" />
                <circle cx="400" cy="400" r="6" class="gear-accent" />
              </g>
            </svg>
          </div>

        </div>
      </div>

      <!-- RIGHT STEAM GAUGE (Escapement Torque) -->
      <div class="gauge-container right-gauge" id="torque-gauge">
        <div class="gauge-glass">
          <div class="gauge-bezel"></div>
          <div class="gauge-dial">
            <div class="gauge-ticks"></div>
            <div class="gauge-needle" id="needle-torque"></div>
            <div class="gauge-center"></div>
            <div class="gauge-label">ESCAPE N·m</div>
            <div class="gauge-value" id="val-torque">0</div>
          </div>
          <div class="gauge-reflection"></div>
        </div>
      </div>

    </div>

    <!-- FLOATING GLASSMORPHIC CONTROL DASHBOARD -->
    <footer class="control-dashboard">
      <div class="dashboard-inner">
        
        <!-- Theme Selection Grid -->
        <div class="control-block themes-block">
          <span class="block-label">AESTHETIC SCHEME</span>
          <div class="theme-picker">
            <button class="theme-btn active" data-theme="brass" style="--btn-color: #ffd700;">
              <span class="swatch"></span> Brass
            </button>
            <button class="theme-btn" data-theme="copper" style="--btn-color: #e07a5f;">
              <span class="swatch"></span> Copper
            </button>
            <button class="theme-btn" data-theme="steel" style="--btn-color: #9cb4cc;">
              <span class="swatch"></span> Steel
            </button>
            <button class="theme-btn" data-theme="obsidian" style="--btn-color: #f4a261;">
              <span class="swatch"></span> Obsidian
            </button>
          </div>
        </div>

        <!-- Speed Regulator Slider -->
        <div class="control-block speed-block">
          <div class="slider-header">
            <span class="block-label">SPEED REGULATOR</span>
            <span id="speed-indicator" class="digital-readout">1.00x</span>
          </div>
          <input type="range" id="speed-slider" min="0" max="50" step="0.1" value="1.0">
          <div class="slider-ticks">
            <span>PAUSE</span>
            <span>REALTIME (1x)</span>
            <span>FAST (25x)</span>
            <span>MAX (50x)</span>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="control-block actions-block">
          <span class="block-label">PNEUMATICS & SOUND</span>
          <div class="action-row">
            <button id="btn-steam" class="dashboard-btn primary-btn">
              <span class="btn-icon">💨</span> RELEASE STEAM
            </button>
            <button id="btn-audio" class="dashboard-btn toggle-btn muted">
              <span class="btn-icon" id="audio-icon">🔇</span> SOUND OFF
            </button>
            <button id="btn-gong" class="dashboard-btn secondary-btn">
              <span class="btn-icon">🔔</span> CHIME
            </button>
          </div>
        </div>

        <!-- Live Diagnostics -->
        <div class="control-block diagnostics-block">
          <span class="block-label">DIAGNOSTICS</span>
          <div class="diag-grid">
            <div class="diag-item">
              <span class="diag-lbl">FPS:</span>
              <span class="diag-val digital-readout" id="diag-fps">60.0</span>
            </div>
            <div class="diag-item">
              <span class="diag-lbl">RATE:</span>
              <span class="diag-val digital-readout" id="diag-rate">1.00 Hz</span>
            </div>
          </div>
        </div>

      </div>
    </footer>

  </div>

  <!-- SVG Gradient Definitions -->
  <svg style="position: absolute; width: 0; height: 0;" width="0" height="0">
    <defs>
      <!-- Drop Shadows -->
      <filter id="gear-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="4" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.85"/>
      </filter>
      <filter id="hand-shadow" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="6" dy="12" stdDeviation="8" flood-color="#000" flood-opacity="0.9"/>
      </filter>

      <!-- Brass Theme Gradients -->
      <linearGradient id="brass-grad-bright" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fff6cc" />
        <stop offset="40%" stop-color="#e6b800" />
        <stop offset="80%" stop-color="#997a00" />
        <stop offset="100%" stop-color="#4d3d00" />
      </linearGradient>
      <linearGradient id="brass-grad-mid" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffd280" />
        <stop offset="50%" stop-color="#d4af37" />
        <stop offset="100%" stop-color="#664d00" />
      </linearGradient>
      <linearGradient id="brass-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#b38600" />
        <stop offset="100%" stop-color="#332600" />
      </linearGradient>

      <!-- Copper Theme Gradients -->
      <linearGradient id="copper-grad-bright" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffdfd3" />
        <stop offset="40%" stop-color="#d1603d" />
        <stop offset="80%" stop-color="#9c3a1c" />
        <stop offset="100%" stop-color="#541b0b" />
      </linearGradient>
      <linearGradient id="copper-grad-mid" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e29578" />
        <stop offset="50%" stop-color="#b55131" />
        <stop offset="100%" stop-color="#591c0a" />
      </linearGradient>
      <linearGradient id="copper-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8c3319" />
        <stop offset="100%" stop-color="#260700" />
      </linearGradient>

      <!-- Steel Theme Gradients -->
      <linearGradient id="steel-grad-bright" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="40%" stop-color="#a3b8cc" />
        <stop offset="80%" stop-color="#5c758c" />
        <stop offset="100%" stop-color="#2c3e50" />
      </linearGradient>
      <linearGradient id="steel-grad-mid" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#cbdbe6" />
        <stop offset="50%" stop-color="#7a94ad" />
        <stop offset="100%" stop-color="#3b4d5e" />
      </linearGradient>
      <linearGradient id="steel-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#5e758a" />
        <stop offset="100%" stop-color="#1b2836" />
      </linearGradient>

      <!-- Obsidian Gold Theme Gradients -->
      <linearGradient id="obsidian-grad-bright" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#555555" />
        <stop offset="30%" stop-color="#1a1a1a" />
        <stop offset="70%" stop-color="#0a0a0a" />
        <stop offset="100%" stop-color="#000000" />
      </linearGradient>
      <linearGradient id="obsidian-grad-mid" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffd700" />
        <stop offset="25%" stop-color="#444444" />
        <stop offset="75%" stop-color="#151515" />
        <stop offset="100%" stop-color="#e6b800" />
      </linearGradient>
      <linearGradient id="obsidian-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffd700" />
        <stop offset="10%" stop-color="#111111" />
        <stop offset="90%" stop-color="#000000" />
        <stop offset="100%" stop-color="#b38600" />
      </linearGradient>
    </defs>
  </svg>

  <script src="script.js"></script>
</body>
</html>
